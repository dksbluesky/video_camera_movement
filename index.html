<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Cinematography Master</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --accent-color: #38bdf8; --text-main: #f1f5f9; --text-sub: #94a3b8; --fav-color: #f43f5e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; }
        header { padding: 25px 20px; text-align: center; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.1); }
        header h1 { margin: 0; font-size: 1rem; letter-spacing: 2px; color: var(--accent-color); }
        .app-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .fav-header-link { background: rgba(255,255,255,0.03); padding: 18px; border-radius: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; border: 1px solid var(--fav-color); cursor: pointer; }
        .category-card { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; }
        .item-row { background: var(--card-bg); padding: 18px 20px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0f19; z-index: 1000; display: none; padding: 40px 20px; }
        .modal-content { background: var(--card-bg); border-radius: 25px; padding: 35px 25px; max-width: 450px; margin: 0 auto; position: relative; }
        .close-btn { position: absolute; top: 20px; left: 20px; cursor: pointer; color: var(--text-sub); }
        .modal-heart { position: absolute; top: 20px; right: 25px; font-size: 1.5rem; color: var(--text-sub); cursor: pointer; }
        .modal-heart.active { color: var(--fav-color); }
        .word-title { font-size: 2.2rem; margin: 30px 0 10px 0; color: var(--accent-color); text-align: center; }
        .translation { font-size: 1.2rem; margin-bottom: 25px; text-align: center; }
        .meaning { font-size: 0.95rem; color: var(--text-sub); line-height: 1.7; margin-bottom: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .prompt-box { background: #000; padding: 18px; border-radius: 12px; font-family: monospace; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 25px; word-break: break-all; }
        .copy-btn { background: var(--accent-color); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; }
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--accent-color); color: #000; padding: 10px 25px; border-radius: 30px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1 id="main-title">AI CINEMATOGRAPHY (VER 101)</h1>
</header>

<div class="app-container" id="app-view"></div>

<div class="modal" id="detail-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">✕ 返回</span>
        <span class="modal-heart" id="modal-heart" onclick="toggleFavorite()">❤</span>
        <div id="modal-body"></div>
    </div>
</div>

<div id="toast">已複製</div>

<script>
    // 【暴力法 1】強制清空所有舊緩存 (只執行一次)
    if(!localStorage.getItem('CLEANED_VER_101')) {
        localStorage.clear();
        localStorage.setItem('CLEANED_VER_101', 'true');
    }

    const vocabularyData = [
        { "category": "基礎旋轉與平移 (Basic Rotation & Lateral)", "word": "Tilt Up", "chinese_translation": "仰移鏡頭", "meaning": "攝影機垂直向上旋轉。", "example": "Tilt up, hero shot." },
        { "category": "基礎旋轉與平移 (Basic Rotation & Lateral)", "word": "Tilt Down", "chinese_translation": "俯移鏡頭", "meaning": "攝影機垂直向下旋轉。", "example": "Tilt down, reveal feet." },
        { "category": "基礎旋轉與平移 (Basic Rotation & Lateral)", "word": "Truck Left", "chinese_translation": "左側移", "meaning": "向左橫向移動。", "example": "Lateral truck left." },
        { "category": "基礎旋轉與平移 (Basic Rotation & Lateral)", "word": "Truck Right", "chinese_translation": "右側移", "meaning": "向右橫向移動。", "example": "Lateral truck right." },
        { "category": "基礎旋轉與平移 (Basic Rotation & Lateral)", "word": "Whip Pan", "chinese_translation": "急速橫搖", "meaning": "極速旋轉產生模糊。", "example": "Whip pan transition." },
        { "category": "基礎垂直與升降 (Basic Vertical & Crane)", "word": "Pedestal Down", "chinese_translation": "升降下降", "meaning": "機身垂直下移。", "example": "Pedestal down." },
        { "category": "基礎垂直與升降 (Basic Vertical & Crane)", "word": "Pedestal Up", "chinese_translation": "升降上升", "meaning": "機身垂直上移。", "example": "Pedestal up." },
        { "category": "基礎垂直與升降 (Basic Vertical & Crane)", "word": "Crane Up", "chinese_translation": "搖臂上升", "meaning": "模擬搖臂擴大視野。", "example": "Crane up, epic scale." },
        { "category": "基礎垂直與升降 (Basic Vertical & Crane)", "word": "Crane Down", "chinese_translation": "搖臂下降", "meaning": "從高處降落。", "example": "Crane down landing." },
        { "category": "推拉與變焦控制 (Dolly & Zoom Control)", "word": "Slow Dolly In", "chinese_translation": "慢速前推", "meaning": "緩慢移向主體。", "example": "Slow dolly in." },
        { "category": "推拉與變焦控制 (Dolly & Zoom Control)", "word": "Slow Dolly Out", "chinese_translation": "慢速後退", "meaning": "緩慢遠離主體。", "example": "Slow dolly out." },
        { "category": "推拉與變焦控制 (Dolly & Zoom Control)", "word": "Fast Dolly In", "chinese_translation": "急速前進", "meaning": "快速推進創造急迫感。", "example": "Fast dolly in rush." },
        { "category": "推拉與變焦控制 (Dolly & Zoom Control)", "word": "Smooth Zoom In", "chinese_translation": "平滑縮放", "meaning": "僅改變焦距放大。", "example": "Optical zoom in." },
        { "category": "推拉與變焦控制 (Dolly & Zoom Control)", "word": "Smooth Zoom Out", "chinese_translation": "平滑縮小", "meaning": "焦距縮小展現環境。", "example": "Optical zoom out." },
        { "category": "推拉與變焦控制 (Dolly & Zoom Control)", "word": "Snap Zoom", "chinese_translation": "快閃變焦", "meaning": "極速縮放模擬震驚。", "example": "Snap zoom impact." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "Leading Shot", "chinese_translation": "領航追蹤", "meaning": "攝影機隨主體後退。", "example": "Leading shot tracking." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "Following Shot", "chinese_translation": "跟隨追蹤", "meaning": "跟在主體後方。", "example": "Following shot." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "Side Tracking", "chinese_translation": "側向平行追蹤", "meaning": "側面平行移動。", "example": "Side tracking parallel." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "POV Walk", "chinese_translation": "第一人稱步行", "meaning": "模擬人眼視角晃動。", "example": "POV walk entry." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "Over-the-Shoulder", "chinese_translation": "過肩鏡頭", "meaning": "肩膀後方拍攝對方。", "example": "OTS dialogue." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "Fisheye Lens", "chinese_translation": "魚眼鏡頭", "meaning": "廣角畸變窺視感。", "example": "Fisheye distortion." },
        { "category": "主體追蹤與視角 (Subject Tracking & POV)", "word": "Handheld", "chinese_translation": "手持鏡頭", "meaning": "自然晃動真實感。", "example": "Handheld realism." },
        { "category": "環繞與弧形運鏡 (Orbital & Arc)", "word": "Orbit 180", "chinese_translation": "180度環繞", "meaning": "繞主體旋轉半圈。", "example": "Orbit 180 epic." },
        { "category": "環繞與弧形運鏡 (Orbital & Arc)", "word": "Fast 360 Spin", "chinese_translation": "360度旋轉", "meaning": "快速旋轉一整圈。", "example": "Fast 360 orbit spin." },
        { "category": "環繞與弧形運鏡 (Orbital & Arc)", "word": "Cinematic Arc", "chinese_translation": "電影弧形運鏡", "meaning": "緩慢弧形揭露側面。", "example": "Slow cinematic arc." },
        { "category": "焦點深度與特效 (Lens Depth & VFX)", "word": "Dolly Zoom", "chinese_translation": "滑動變焦", "meaning": "背景扭曲主體固定。", "example": "Dolly zoom vertigo." },
        { "category": "焦點深度與特效 (Lens Depth & VFX)", "word": "Macro Zoom", "chinese_translation": "微距縮放", "meaning": "進入微觀景觀。", "example": "Extreme macro zoom." },
        { "category": "焦點深度與特效 (Lens Depth & VFX)", "word": "Hyper-Zoom", "chinese_translation": "超級變焦", "meaning": "極遠拉近至地面。", "example": "Cosmic hyper-zoom." },
        { "category": "焦點深度與特效 (Lens Depth & VFX)", "word": "Focus Pull", "chinese_translation": "由模糊到清晰", "meaning": "對焦至主體。", "example": "Reveal from blur." },
        { "category": "焦點深度與特效 (Lens Depth & VFX)", "word": "Rack Focus", "chinese_translation": "焦點變換", "meaning": "前後景焦點切換。", "example": "Rack focus flower to person." },
        { "category": "焦點深度與特效 (Lens Depth & VFX)", "word": "Dutch Angle", "chinese_translation": "荷蘭式傾斜", "meaning": "傾斜拍攝營造不安。", "example": "Dutch angle tension." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Reveal Behind", "chinese_translation": "遮擋後揭示", "meaning": "從障礙物後滑出。", "example": "Reveal from pillar." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Fly-Through", "chinese_translation": "穿梭鏡頭", "meaning": "穿過物理障礙。", "example": "Fly-through window." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Drone Flyover", "chinese_translation": "高空掠過", "meaning": "強調環境宏大。", "example": "Drone flyover sea." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Drone Reveal", "chinese_translation": "無人機揭示", "meaning": "上升仰移創造探索感。", "example": "Epic drone reveal." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Drone Orbit", "chinese_translation": "大尺度環繞", "meaning": "廣闊空間大旋轉。", "example": "Large-scale drone orbit." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Top-Down", "chinese_translation": "上帝視角", "meaning": "垂直向下幾何美感。", "example": "Top-down drone shot." },
        { "category": "環境揭示與穿梭 (Reveal & Fly-Through)", "word": "Drone Dive", "chinese_translation": "穿越機俯衝", "meaning": "極速俯衝動能。", "example": "FPV drone dive." }
    ];

    let favorites = JSON.parse(localStorage.getItem('FAV_101')) || [];
    let activeItem = null;
    let currentCategory = null;
    const appView = document.getElementById('app-view');
    const modal = document.getElementById('detail-modal');

    function renderHome() {
        currentCategory = null;
        appView.innerHTML = `
            <div class="fav-header-link" onclick="renderFavorites()">
                <span>❤ 我的常用項目</span>
                <span style="font-size:0.8rem">點擊進入 ➔</span>
            </div>
            <div style="font-size:0.75rem; color:var(--text-sub); margin-bottom:10px;">分類 CATEGORIES</div>
        `;
        const categories = [...new Set(vocabularyData.map(item => item.category))];
        categories.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'category-card';
            card.innerHTML = `<h3>${cat}</h3><span>›</span>`;
            card.onclick = () => renderItemList(cat);
            appView.appendChild(card);
        });
    }

    function renderItemList(category) {
        currentCategory = category;
        appView.innerHTML = `<div style="margin-bottom:20px; color:var(--accent-color); cursor:pointer" onclick="renderHome()">⇠ 返回選單</div>`;
        const items = vocabularyData.filter(i => i.category === category);
        items.forEach(item => {
            const isFav = favorites.includes(item.word);
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `<span class="word-name">${item.word}</span><span style="color:var(--fav-color)">${isFav ? '❤️' : '›'}</span>`;
            row.onclick = () => openModal(item);
            appView.appendChild(row);
        });
    }

    function renderFavorites() {
        currentCategory = "FAV";
        appView.innerHTML = `<div style="margin-bottom:20px; color:var(--accent-color); cursor:pointer" onclick="renderHome()">⇠ 返回首頁</div>`;
        if (favorites.length === 0) {
            appView.innerHTML += `<p style="text-align:center; color:var(--text-sub); margin-top:50px;">尚無收藏</p>`;
            return;
        }
        favorites.forEach(wordStr => {
            const item = vocabularyData.find(i => i.word === wordStr);
            if (item) {
                const row = document.createElement('div');
                row.className = 'item-row';
                row.innerHTML = `<span class="word-name">${item.word}</span><span>❤️</span>`;
                row.onclick = () => openModal(item);
                appView.appendChild(row);
            }
        });
    }

    function openModal(item) {
        activeItem = item;
        const isFav = favorites.includes(item.word);
        document.getElementById('modal-heart').className = isFav ? 'modal-heart active' : 'modal-heart';
        document.getElementById('modal-body').innerHTML = `
            <h2 class="word-title">${item.word}</h2>
            <div class="translation">${item.chinese_translation}</div>
            <div class="meaning">${item.meaning}</div>
            <div class="prompt-box" id="prompt-text">${item.example}</div>
            <button class="copy-btn" onclick="copyPrompt()">COPY PROMPT</button>
        `;
        modal.style.display = 'block';
    }

    function closeModal() {
        modal.style.display = 'none';
        if (currentCategory === "FAV") renderFavorites();
        else if (currentCategory) renderItemList(currentCategory);
    }

    function toggleFavorite() {
        const index = favorites.indexOf(activeItem.word);
        if (index > -1) { favorites.splice(index, 1); showToast("已移除"); }
        else { favorites.push(activeItem.word); showToast("已收藏"); }
        localStorage.setItem('FAV_101', JSON.stringify(favorites));
        document.getElementById('modal-heart').classList.toggle('active');
    }

    function copyPrompt() {
        const text = document.getElementById('prompt-text').innerText;
        navigator.clipboard.writeText(text).then(() => showToast("已複製"));
    }

    function showToast(m) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 1000);
    }

    // 【暴力法 2】徹底禁用 Service Worker 註冊代碼
    // 之前有的註冊代碼已被我刪除

    renderHome();
</script>
</body>
</html>
